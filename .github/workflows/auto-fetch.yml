name: 自动抓取线路文件

# 触发条件
on:
  schedule:
    # 每天北京时间早上 8 点和晚上 8 点自动执行一次 (Cron 表达式使用的是 UTC 时间，比北京时间慢 8 小时)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 允许你在 GitHub 页面上手动点击按钮触发，方便测试

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    # 1. 检出你自己的仓库代码
    - name: Checkout own repo
      uses: actions/checkout@v4

    # 2. 从别人的仓库抓取目标文件（这里以抓取 JSON 为例）
    - name: Fetch target file
      run: |
        # 创建一个保存文件的目录（如果需要的话，比如叫做 datas）
        mkdir -p datas
        
        # 使用 curl 下载别人仓库的文件
        # 【注意】请把下面 URL 换成你要抓取的 GitHub Raw 真实链接
        curl -L "https://raw.githubusercontent.com/目标用户名/目标仓库名/分支名/对方的文件名.json" -o datas/local_config.json

    # 3. 检查文件是否有变动，如果有，自动提交并推送到你的仓库
    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # 检查是否有文件修改
        git add .
        if [{ git diff --staged --quiet }]; then
          echo "文件没有变化，无需更新。"
        else
          git commit -m "自动同步最新线路: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
