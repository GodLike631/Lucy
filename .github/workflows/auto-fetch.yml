name: 自动多源抓取与去重

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  fetch-and-sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout own repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 【核心改动】同时下载两个源的文件
    - name: Fetch target files
      run: |
        mkdir -p datas
        # 下载第一个源 (CNB 仓库)
        curl -L "https://cnb.cool/fish2018/xs/-/git/raw/main/api.json" -o datas/source1.json
        # 下载第二个源 (GitHub 仓库)
        curl -L "https://raw.githubusercontent.com/FGBLH/GHK/refs/heads/main/海豚.json" -o datas/source2.json

    # 运行升级后的 Python 脚本进行融合去重
    - name: Modify and Merge JSON
      run: |
        python modify_config.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        git add .
        if [ -z "$(git status --porcelain)" ]; then
          echo "文件没有变化，无需更新。"
        else
          git commit -m "自动多源合并去重: $(date +'%Y-%m-%d %H:%M:%S')"
          git push
        fi
